name: Validate

on:
  pull_request:
  push:
    branches:
      - develop
      - main
      - master
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: "false"

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dev dependencies
        run: python -m pip install --upgrade pip ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install security audit dependencies
        run: python -m pip install --upgrade pip ".[dev]" bandit pip-audit

      - name: Bandit
        run: bandit -r custom_components/chmi_weather

      - name: Pip audit
        run: pip-audit --local --skip-editable --progress-spinner off

  ha-stable:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Home Assistant stable test dependencies
        run: python -m pip install --upgrade pip ".[dev,ha-stable]"

      - name: Home Assistant integration tests
        run: pytest tests_ha -o asyncio_mode=auto

  ha-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install latest Home Assistant beta test dependencies
        run: |
          python -m pip install --upgrade pip ".[dev]"
          python -m pip install --upgrade --pre "pytest-homeassistant-custom-component>=0.13.341"

      - name: Home Assistant beta integration tests
        run: pytest tests_ha -o asyncio_mode=auto
